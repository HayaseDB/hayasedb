services:
  postgres:
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - pgdata:/var/lib/postgresql
    networks: [internal]
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redisdata:/data
    networks: [internal]
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - '${MAIL_SMTP_PORT:-1025}:1025'
      - '${MAILPIT_UI_PORT:-8025}:8025'
    networks: [internal]
    healthcheck:
      test: ['CMD', 'wget', '-q', '-O-', 'http://localhost:8025/readyz']
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2025-04-08T15-41-24Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    ports:
      - '${MINIO_PORT:-9000}:9000'
      - '${MINIO_CONSOLE_PORT:-9001}:9001'
    volumes:
      - minio-data:/data
    networks: [traefik-public, internal]
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 5s
      timeout: 5s
      retries: 10
    deploy:
      labels:
        - traefik.enable=true
        - traefik.docker.network=traefik-public
        - traefik.http.routers.hayasedb-minio.rule=Host(`${MINIO_DOMAIN}`)
        - traefik.http.routers.hayasedb-minio.entrypoints=websecure
        - traefik.http.routers.hayasedb-minio.tls.certresolver=le
        - traefik.http.routers.hayasedb-minio.service=hayasedb-minio
        - traefik.http.services.hayasedb-minio.loadbalancer.server.port=9000
        - traefik.http.routers.hayasedb-minio-console.rule=Host(`${MINIO_CONSOLE_DOMAIN}`)
        - traefik.http.routers.hayasedb-minio-console.entrypoints=websecure
        - traefik.http.routers.hayasedb-minio-console.tls.certresolver=le
        - traefik.http.routers.hayasedb-minio-console.service=hayasedb-minio-console
        - traefik.http.services.hayasedb-minio-console.loadbalancer.server.port=9001

  api:
    image: ghcr.io/hayasedb/hayasedb-api:${TAG:-latest}
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    profiles: [app]
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_HOST: redis
      REDIS_PORT: '${REDIS_PORT:-6379}'
      API_HOST: 0.0.0.0
      API_PORT: '3000'
      API_PUBLIC_URL: https://${API_DOMAIN}
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_TRUSTED_ORIGINS: https://${WEB_DOMAIN},https://${ADMIN_DOMAIN}
      MINIO_ENDPOINT: minio
      MINIO_PORT: '9000'
      MINIO_USE_SSL: 'false'
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET:-media}
      MINIO_PUBLIC_URL: https://${MINIO_DOMAIN}
      MAIL_DRIVER: ${MAIL_DRIVER:-smtp}
      MAIL_FROM: ${MAIL_FROM}
      MAIL_RESEND_API_KEY: ${MAIL_RESEND_API_KEY-}
    depends_on:
      minio:
        condition: service_healthy
    networks: [traefik-public, internal]
    deploy:
      replicas: 2
      update_config:
        order: start-first
      restart_policy:
        condition: any
      labels:
        - traefik.enable=true
        - traefik.docker.network=traefik-public
        - traefik.http.routers.hayasedb-api.rule=Host(`${API_DOMAIN}`)
        - traefik.http.routers.hayasedb-api.entrypoints=websecure
        - traefik.http.routers.hayasedb-api.tls.certresolver=le
        - traefik.http.services.hayasedb-api.loadbalancer.server.port=3000

  web:
    image: ghcr.io/hayasedb/hayasedb-web:${TAG:-latest}
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    profiles: [app]
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NITRO_PORT: '3001'
      NITRO_HOST: 0.0.0.0
      NUXT_API_URL: https://${API_DOMAIN}
    networks: [traefik-public, internal]
    deploy:
      replicas: 2
      update_config:
        order: start-first
      restart_policy:
        condition: any
      labels:
        - traefik.enable=true
        - traefik.docker.network=traefik-public
        - traefik.http.routers.hayasedb-web.rule=Host(`${WEB_DOMAIN}`)
        - traefik.http.routers.hayasedb-web.entrypoints=websecure
        - traefik.http.routers.hayasedb-web.tls.certresolver=le
        - traefik.http.services.hayasedb-web.loadbalancer.server.port=3001

  admin:
    image: ghcr.io/hayasedb/hayasedb-admin:${TAG:-latest}
    build:
      context: .
      dockerfile: docker/admin.Dockerfile
    profiles: [app]
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NITRO_PORT: '3002'
      NITRO_HOST: 0.0.0.0
      NUXT_API_URL: https://${API_DOMAIN}
    networks: [traefik-public, internal]
    deploy:
      replicas: 1
      update_config:
        order: start-first
      restart_policy:
        condition: any
      labels:
        - traefik.enable=true
        - traefik.docker.network=traefik-public
        - traefik.http.routers.hayasedb-admin.rule=Host(`${ADMIN_DOMAIN}`)
        - traefik.http.routers.hayasedb-admin.entrypoints=websecure
        - traefik.http.routers.hayasedb-admin.tls.certresolver=le
        - traefik.http.services.hayasedb-admin.loadbalancer.server.port=3002

networks:
  traefik-public: {}
  internal: {}

volumes:
  pgdata: {}
  redisdata: {}
  minio-data: {}
