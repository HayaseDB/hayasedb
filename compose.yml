services:
  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks: [internal]
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redisdata:/data
    networks: [internal]
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - '${SMTP_PORT:-1025}:1025'
      - '${MAILPIT_UI_PORT:-8025}:8025'
    networks: [internal]
    healthcheck:
      test: ['CMD', 'wget', '-q', '-O-', 'http://localhost:8025/readyz']
      interval: 5s
      timeout: 5s
      retries: 10

  garage:
    image: dxflrs/garage:v2.1.0
    restart: unless-stopped
    environment:
      GARAGE_RPC_SECRET: ${GARAGE_RPC_SECRET}
      GARAGE_ADMIN_TOKEN: ${GARAGE_ADMIN_TOKEN:-}
    ports:
      - '${S3_PORT:-3900}:3900'
      - '${S3_ADMIN_PORT:-3903}:3903'
    volumes:
      - garage-meta:/var/lib/garage/meta
      - garage-data:/var/lib/garage/data
      - ./garage.toml:/etc/garage.toml:ro
    networks: [internal]

  api:
    image: ghcr.io/hayasedb/hayasedb-api:${TAG:-latest}
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    profiles: [app]
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_HOST: redis
      REDIS_PORT: '${REDIS_PORT:-6379}'
      API_HOST: 0.0.0.0
      API_PORT: '3000'
      API_PUBLIC_URL: https://${API_DOMAIN}
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_BASE_URL: https://${API_DOMAIN}
      AUTH_TRUSTED_ORIGINS: https://${WEB_DOMAIN},https://${ADMIN_DOMAIN}
      S3_ENDPOINT: http://garage:3900
      S3_REGION: garage
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET_PUBLIC: ${S3_BUCKET_PUBLIC:-media-public}
      S3_BUCKET_ORIGINAL: ${S3_BUCKET_ORIGINAL:-media-original}
      MAIL_DRIVER: ${MAIL_DRIVER:-resend}
      MAIL_FROM: ${MAIL_FROM}
      RESEND_API_KEY: ${RESEND_API_KEY-}
    networks: [traefik-public, internal]
    deploy:
      replicas: 2
      update_config:
        order: start-first
      restart_policy:
        condition: any
      labels:
        - traefik.enable=true
        - traefik.docker.network=traefik-public
        - traefik.http.routers.hayasedb-api.rule=Host(`${API_DOMAIN}`)
        - traefik.http.routers.hayasedb-api.entrypoints=websecure
        - traefik.http.routers.hayasedb-api.tls.certresolver=le
        - traefik.http.services.hayasedb-api.loadbalancer.server.port=3000

  web:
    image: ghcr.io/hayasedb/hayasedb-web:${TAG:-latest}
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    profiles: [app]
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NITRO_PORT: '3001'
      NITRO_HOST: 0.0.0.0
      NUXT_PUBLIC_API_URL: https://${API_DOMAIN}
    networks: [traefik-public, internal]
    deploy:
      replicas: 2
      update_config:
        order: start-first
      restart_policy:
        condition: any
      labels:
        - traefik.enable=true
        - traefik.docker.network=traefik-public
        - traefik.http.routers.hayasedb-web.rule=Host(`${WEB_DOMAIN}`)
        - traefik.http.routers.hayasedb-web.entrypoints=websecure
        - traefik.http.routers.hayasedb-web.tls.certresolver=le
        - traefik.http.services.hayasedb-web.loadbalancer.server.port=3001

  admin:
    image: ghcr.io/hayasedb/hayasedb-admin:${TAG:-latest}
    build:
      context: .
      dockerfile: docker/admin.Dockerfile
    profiles: [app]
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NITRO_PORT: '3002'
      NITRO_HOST: 0.0.0.0
      NUXT_PUBLIC_API_URL: https://${API_DOMAIN}
    networks: [traefik-public, internal]
    deploy:
      replicas: 1
      update_config:
        order: start-first
      restart_policy:
        condition: any
      labels:
        - traefik.enable=true
        - traefik.docker.network=traefik-public
        - traefik.http.routers.hayasedb-admin.rule=Host(`${ADMIN_DOMAIN}`)
        - traefik.http.routers.hayasedb-admin.entrypoints=websecure
        - traefik.http.routers.hayasedb-admin.tls.certresolver=le
        - traefik.http.services.hayasedb-admin.loadbalancer.server.port=3002

networks:
  traefik-public:
    external: true
  internal: {}

volumes:
  pgdata: {}
  redisdata: {}
  garage-meta: {}
  garage-data: {}
