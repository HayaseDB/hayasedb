name: Release

on:
  release:
    types: [published]

permissions: {}

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  validate-version:
    name: Validate (${{ matrix.package }})
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    strategy:
      fail-fast: true
      matrix:
        include:
          - package: api
            path: apps/api/package.json
          - package: web
            path: apps/web/package.json
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate version
        uses: ./.github/actions/validate-version
        with:
          package: ${{ matrix.package }}
          path: ${{ matrix.path }}

  changelog:
    name: Changelog
    needs: validate-version
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          sparse-checkout: .github

      - name: Generate changelog
        uses: ./.github/actions/generate-changelog
        with:
          tag-name: ${{ github.event.release.tag_name }}
          release-body: ${{ github.event.release.body }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

  test:
    needs: validate-version
    permissions:
      contents: read
    uses: ./.github/workflows/test.yml

  build:
    name: Build (${{ matrix.package }})
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - package: api
            app-dir: apps/api
            image: ghcr.io/hayasedb/hayasedb-api
          - package: web
            app-dir: apps/web
            image: ghcr.io/hayasedb/hayasedb-web
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          sparse-checkout: |
            ${{ matrix.app-dir }}
            packages/shared
            packages/sdk
            package.json
            pnpm-lock.yaml
            pnpm-workspace.yaml
            .github

      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ matrix.image }}
          tags: |
            type=semver,pattern=v{{version}}
            type=raw,value=latest

      - name: Build and push
        uses: ./.github/actions/docker-build
        with:
          context: .
          dockerfile: ./${{ matrix.app-dir }}/Dockerfile
          image: ${{ matrix.image }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-scope: ${{ matrix.package }}
          registry-password: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Compute expected version
        id: version
        run: |
          VERSION=$(jq -r '.version' apps/api/package.json)
          echo "expected=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Deploy
        uses: ./.github/actions/deploy-portainer
        with:
          webhook-url: ${{ secrets.PORTAINER_WEBHOOK_URL }}
          environment: production
          api-url: ${{ vars.PRODUCTION_API_URL }}
          expected-version: ${{ steps.version.outputs.expected }}
