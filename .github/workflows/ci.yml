name: CI

on:
  pull_request:
  workflow_dispatch:
  push:
    branches-ignore:
      - main

permissions: {}

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    permissions:
      contents: read
    uses: ./.github/workflows/test.yml
