version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    versioning-strategy: increase
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      commitlint:
        patterns:
          - "@commitlint/*"
    ignore:
      - dependency-name: "@types/node"
    labels:
      - "dependencies"
    open-pull-requests-limit: 5

  - package-ecosystem: "npm"
    directory: "/apps/api"
    versioning-strategy: increase
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      nestjs:
        patterns:
          - "@nestjs/*"
      testing:
        patterns:
          - "jest"
          - "ts-jest"
          - "@types/jest"
          - "supertest"
          - "@types/supertest"
      eslint:
        patterns:
          - "eslint*"
          - "@eslint/*"
          - "typescript-eslint"
      typescript:
        patterns:
          - "typescript"
          - "@types/*"
      react-email:
        patterns:
          - "@react-email/*"
          - "react"
      database:
        patterns:
          - "typeorm"
          - "@nestjs/typeorm"
          - "pg"
      auth:
        patterns:
          - "passport"
          - "passport-*"
          - "@nestjs/passport"
          - "@nestjs/jwt"
      queue:
        patterns:
          - "bullmq"
          - "ioredis"
      minio:
        patterns:
          - "@minio/*"
      swagger:
        patterns:
          - "@nestjs/swagger"
    ignore:
      - dependency-name: "@types/node"
      - dependency-name: "typeorm"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@nestjs/*"
        update-types: ["version-update:semver-major"]
    labels:
      - "dependencies"
      - "api"
    open-pull-requests-limit: 10

  - package-ecosystem: "npm"
    directory: "/apps/web"
    versioning-strategy: increase
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      nuxt:
        patterns:
          - "nuxt"
          - "@nuxt/*"
          - "@nuxtjs/*"
      eslint:
        patterns:
          - "eslint*"
          - "@eslint/*"
          - "typescript-eslint"
      tailwind:
        patterns:
          - "tailwindcss"
          - "@tailwindcss/*"
          - "tailwind-*"
      ui:
        patterns:
          - "reka-ui"
          - "lucide-vue-next"
          - "shadcn-nuxt"
          - "class-variance-authority"
          - "clsx"
          - "tailwind-merge"
      i18n:
        patterns:
          - "vue-i18n"
          - "@intlify/*"
    ignore:
      - dependency-name: "@types/node"
    labels:
      - "dependencies"
      - "web"
    open-pull-requests-limit: 10

  - package-ecosystem: "npm"
    directory: "/packages/shared"
    versioning-strategy: increase
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      eslint:
        patterns:
          - "eslint*"
          - "@eslint/*"
          - "typescript-eslint"
    labels:
      - "dependencies"
      - "shared"
    open-pull-requests-limit: 5

  - package-ecosystem: "npm"
    directory: "/packages/sdk"
    versioning-strategy: increase
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      eslint:
        patterns:
          - "eslint*"
          - "@eslint/*"
          - "typescript-eslint"
    labels:
      - "dependencies"
      - "sdk"
    open-pull-requests-limit: 5

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "chore"
      include: "scope"
    labels:
      - "dependencies"
    open-pull-requests-limit: 5

  - package-ecosystem: "docker"
    directory: "/apps/api"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "chore"
      include: "scope"
    labels:
      - "dependencies"
      - "docker"

  - package-ecosystem: "docker"
    directory: "/apps/web"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "chore"
      include: "scope"
    labels:
      - "dependencies"
      - "docker"
