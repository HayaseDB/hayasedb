name: Deploy via Portainer
description: Trigger a Portainer webhook to redeploy a stack

inputs:
  webhook-url:
    description: Portainer webhook URL
    required: true
  environment:
    description: Environment name for logging (e.g., staging or production)
    required: false
    default: ""
  api-url:
    description: Base API URL to poll for version verification (e.g., https://api.staging.example.com)
    required: false
    default: ""
  timeout:
    description: Max wait time in seconds for version verification
    required: false
    default: "120"
  interval:
    description: Retry interval in seconds for version verification
    required: false
    default: "5"
  expected-version:
    description: Expected version string to verify after deployment (e.g., 0.1.0-6a28ecf)
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Trigger Portainer webhook
      shell: bash
      env:
        WEBHOOK_URL: ${{ inputs.webhook-url }}
        ENV_LABEL: ${{ inputs.environment }}
      run: |
        [ -n "$ENV_LABEL" ] && ENV_LABEL=" ($ENV_LABEL)"

        response=$(curl -s -o /dev/null -w "%{http_code}" --retry 3 --retry-delay 2 -X POST "$WEBHOOK_URL")

        if [ "$response" -ge 200 ] && [ "$response" -lt 300 ]; then
          echo "Deployment triggered${ENV_LABEL} (HTTP $response)"
        else
          echo "::error::Webhook failed${ENV_LABEL} (HTTP $response)"
          exit 1
        fi

    - name: Verify deployment
      if: inputs.api-url != ''
      shell: bash
      env:
        API_URL: ${{ inputs.api-url }}
        TIMEOUT: ${{ inputs.timeout }}
        INTERVAL: ${{ inputs.interval }}
        ENV_LABEL: ${{ inputs.environment }}
        EXPECTED_VERSION: ${{ inputs.expected-version }}
      run: |
        [ -n "$ENV_LABEL" ] && ENV_LABEL=" ($ENV_LABEL)"

        if [ -n "$EXPECTED_VERSION" ]; then
          echo "Expecting version: ${EXPECTED_VERSION}"
        fi

        RESPONSE_FILE=$(mktemp)
        trap 'rm -f "$RESPONSE_FILE"' EXIT

        elapsed=0

        while [ "$elapsed" -lt "$TIMEOUT" ]; do
          http_code=$(curl -s -o "$RESPONSE_FILE" -w "%{http_code}" --max-time 10 "$API_URL/" 2>/dev/null) || true

          if [ "$http_code" = "200" ]; then
            status=$(jq -r '.status // empty' "$RESPONSE_FILE" 2>/dev/null) || true
            version=$(jq -r '.version // empty' "$RESPONSE_FILE" 2>/dev/null) || true

            if [ "$status" = "ok" ]; then
              if [ -z "$EXPECTED_VERSION" ] || [ "$version" = "$EXPECTED_VERSION" ]; then
                echo "Deployment verified${ENV_LABEL}: version=${version} status=${status}"
                exit 0
              fi
              echo "Waiting for expected version${ENV_LABEL}... (expected=${EXPECTED_VERSION} current=${version}, ${elapsed}s elapsed)"
            else
              echo "Waiting for deployment${ENV_LABEL}... (status=${status}, ${elapsed}s elapsed)"
            fi
          else
            echo "Waiting for deployment${ENV_LABEL}... (${elapsed}s elapsed, HTTP ${http_code})"
          fi

          sleep "$INTERVAL"
          elapsed=$((elapsed + INTERVAL))
        done

        echo "::error::Deployment verification timed out after ${TIMEOUT}s${ENV_LABEL} (expected=${EXPECTED_VERSION} current=${version:-unknown})"
        exit 1
