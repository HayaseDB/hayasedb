networks:
  public:
    external: true
  internal:

volumes:
  postgres_data:
  minio_data:
  pgadmin_data:
  redis_data:

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${API_DATABASE_NAME}
      POSTGRES_USER: ${API_DATABASE_USER}
      POSTGRES_PASSWORD: ${API_DATABASE_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${API_DATABASE_USER} -d ${API_DATABASE_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - internal
      - public
    depends_on:
      postgres:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${APP_STACK_NAME}-pgadmin.rule=Host(`${PGADMIN_DOMAIN}`)"
      - "traefik.http.routers.${APP_STACK_NAME}-pgadmin.entrypoints=websecure"
      - "traefik.http.routers.${APP_STACK_NAME}-pgadmin.tls.certresolver=letsencrypt"
      - "traefik.http.services.${APP_STACK_NAME}-pgadmin.loadbalancer.server.port=80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/misc/ping"]
      interval: 30s
      timeout: 5s
      retries: 3

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${API_MINIO_USER}
      MINIO_ROOT_PASSWORD: ${API_MINIO_PASSWORD}
    volumes:
      - minio_data:/data
    networks:
      - internal
      - public
    labels:
      - "traefik.enable=true"
      # MinIO Console
      - "traefik.http.routers.${APP_STACK_NAME}-minio.rule=Host(`${MINIO_DOMAIN}`)"
      - "traefik.http.routers.${APP_STACK_NAME}-minio.entrypoints=websecure"
      - "traefik.http.routers.${APP_STACK_NAME}-minio.tls.certresolver=letsencrypt"
      - "traefik.http.services.${APP_STACK_NAME}-minio.loadbalancer.server.port=9001"
      # MinIO CDN (S3 API)
      - "traefik.http.routers.${APP_STACK_NAME}-cdn.rule=Host(`${CDN_DOMAIN}`)"
      - "traefik.http.routers.${APP_STACK_NAME}-cdn.entrypoints=websecure"
      - "traefik.http.routers.${APP_STACK_NAME}-cdn.tls.certresolver=letsencrypt"
      - "traefik.http.services.${APP_STACK_NAME}-cdn.loadbalancer.server.port=9000"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: ghcr.io/hayasedb/api:${API_IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      - API_PORT
      - API_LOG_LEVEL
      - API_WEB_URL
      - API_BASE_URL
      - API_ENVIRONMENT
      - API_DATABASE_HOST
      - API_DATABASE_PORT
      - API_DATABASE_NAME
      - API_DATABASE_USER
      - API_DATABASE_PASSWORD
      - API_DATABASE_SYNCHRONIZE
      - API_DATABASE_LOGGING
      - API_STORAGE_PROVIDER
      - API_STORAGE_BUCKET
      - API_CDN_URL
      - API_MINIO_HOST
      - API_MINIO_PORT
      - API_MINIO_USER
      - API_MINIO_PASSWORD
      - API_MINIO_USE_SSL
      - API_REDIS_HOST
      - API_REDIS_PORT
      - API_REDIS_DB
      - API_JWT_SECRET
      - API_JWT_EXPIRES_IN
      - API_JWT_REFRESH_SECRET
      - API_JWT_REFRESH_EXPIRES_IN
      - API_MAIL_PROVIDER
      - API_MAIL_FROM_NAME
      - API_MAIL_FROM_ADDRESS
      - API_MAIL_VERIFY_CONNECTION
      - API_MAIL_SMTP_HOST
      - API_MAIL_SMTP_PORT
      - API_MAIL_SMTP_SECURE
      - API_MAIL_SMTP_USER
      - API_MAIL_SMTP_PASS
      - API_MAIL_QUEUE_ENABLED
      - API_SWAGGER_ENABLED
      - API_SWAGGER_PATH
    networks:
      - internal
      - public
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${APP_STACK_NAME}-api.rule=Host(`${API_DOMAIN}`)"
      - "traefik.http.routers.${APP_STACK_NAME}-api.entrypoints=websecure"
      - "traefik.http.routers.${APP_STACK_NAME}-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.${APP_STACK_NAME}-api.loadbalancer.server.port=${API_PORT}"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:${API_PORT}/health/liveness"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  web:
    image: ghcr.io/hayasedb/web:${WEB_IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      - WEB_API_URL
    networks:
      - internal
      - public
    depends_on:
      api:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${APP_STACK_NAME}-web.rule=Host(`${WEB_DOMAIN}`)"
      - "traefik.http.routers.${APP_STACK_NAME}-web.entrypoints=websecure"
      - "traefik.http.routers.${APP_STACK_NAME}-web.tls.certresolver=letsencrypt"
      - "traefik.http.services.${APP_STACK_NAME}-web.loadbalancer.server.port=3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
