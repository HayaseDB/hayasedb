dir: ..

vars:
  datasource: src/database/data-source.ts

tasks:
  migration:generate:
    desc: Generate a new migration (resets database first)
    run:
      - prompt: confirm
        type: confirm
        message: "This will DROP ALL TABLES and run migrations before generating. Continue?"
        default: false
      - cmd: pnpm typeorm schema:drop -d ${{ datasource }}
        silent: true
      - cmd: pnpm typeorm migration:run -d ${{ datasource }}
        silent: true
      - prompt: name
        type: input
        message: "Migration name:"
        placeholder: "CreateUsersTable"
      - cmd: pnpm typeorm migration:generate src/database/migrations/${{ name }} -d ${{ datasource }}

  migration:run:
    desc: Run pending migrations
    run:
      - cmd: pnpm typeorm migration:run -d ${{ datasource }}

  migration:revert:
    desc: Revert last migration
    run:
      - cmd: pnpm typeorm migration:revert -d ${{ datasource }}

  migration:status:
    desc: Show all migrations and their status
    run:
      - cmd: pnpm typeorm migration:show -d ${{ datasource }}
        silent: true

  schema:sync:
    desc: Synchronize database schema (dev only)
    run:
      - prompt: confirm
        type: confirm
        message: "This will sync schema without migrations. Continue?"
        default: false
      - cmd: pnpm typeorm schema:sync -d ${{ datasource }}

  schema:drop:
    desc: Drop all tables (dangerous)
    run:
      - prompt: confirm
        type: confirm
        message: "This will DROP ALL TABLES. Are you sure?"
        default: false
      - cmd: pnpm typeorm schema:drop -d ${{ datasource }}
